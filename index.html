<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'THSarabunNew','Segoe UI',Roboto,Arial,sans-serif}
body{background:#f0f2f5;color:#1a2633;font-size:14px;min-height:100vh}
.topbar{background:#1a2633;color:#fff;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:80}
.topbar-title{font-size:15px;font-weight:700}
.topbar-time{font-size:11px;color:#6b8096}
/* incoming bar */
.inc-bar{background:#e8f7fa;border-bottom:1px solid #b8e4ed;padding:0 22px;display:none;position:sticky;top:52px;z-index:70}
.inc-bar-inner{display:flex;align-items:center;gap:12px;height:38px;cursor:pointer;user-select:none}
.inc-bar-text{font-size:13px;font-weight:600;color:#0c5460;flex:1}
.inc-badge{background:#17a2b8;color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700}
.inc-arrow{font-size:11px;color:#8fa3b0;transition:transform .2s}
.inc-arrow.open{transform:rotate(180deg)}
.inc-drop{background:#fff;border-bottom:2px solid #17a2b8;display:none}
.inc-drop.open{display:block}
.inc-sort{display:flex;align-items:center;justify-content:space-between;padding:7px 22px;background:#f4f6f9;border-bottom:1px solid #eef1f5;font-size:12px;color:#8fa3b0}
.inc-sort select{font-size:12px;padding:3px 6px;border:1px solid #dde3ea;border-radius:4px;color:#1a2633}
.inc-item{display:flex;align-items:center;gap:10px;padding:10px 22px;border-bottom:1px solid #f0f3f6;flex-wrap:wrap}
.inc-item:last-child{border-bottom:none}
.inc-info{flex:1;min-width:180px}
.inc-name{font-size:13px;font-weight:600;color:#1a2633}
.inc-meta{font-size:11px;color:#8fa3b0;margin-top:2px}
.inc-days .dn{font-size:18px;font-weight:700;text-align:center;min-width:70px}
.inc-days .dl{font-size:10px;color:#8fa3b0;text-align:center}
.ds{color:#dc3545}.dm{color:#856404}.df{color:#155724}
.inc-rmk{border:1px solid #dde3ea;border-radius:5px;padding:5px 9px;font-size:12px;width:150px;outline:none}
.inc-rmk:focus{border-color:#17a2b8}
.btn-recv{background:#d4edda;color:#155724;border:none;border-radius:5px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.btn-recv:hover{background:#c3e6cb}
.btn-recv.done{background:#e9ecef;color:#8fa3b0;cursor:default;pointer-events:none}
/* nav */
.nav{background:#fff;border-bottom:1px solid #dde3ea;display:flex;padding:0 20px;position:sticky;top:52px;z-index:60;overflow-x:auto}
.nav-tab{padding:13px 16px;font-size:13px;font-weight:600;color:#8fa3b0;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.nav-tab:hover{color:#1a2633}
.nav-tab.active{color:#1a2633;border-bottom-color:#1a2633}
/* sub-nav (country picker inside the merged Stock tab) */
.subnav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sub-tab{padding:8px 16px;font-size:13px;font-weight:700;color:#5b6b76;cursor:pointer;border-radius:20px;background:#eef1f5;border:1.5px solid transparent;white-space:nowrap}
.sub-tab:hover{color:#1a2633}
.sub-tab.active{color:#fff;background:#1a2633;border-color:#1a2633}
.main{padding:20px 24px}
/* cards */
.card{background:#fff;border:1px solid #dde3ea;border-radius:10px;margin-bottom:16px;overflow:hidden}
.card-head{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#fafbfc;border-bottom:1px solid #eef1f5;user-select:none}
.card-head:hover{background:#f4f6f9}
.cht{font-size:13px;font-weight:700;color:#1a2633}
.chm{font-size:11px;color:#8fa3b0}
.chev{display:inline-block;transition:transform .2s;color:#8fa3b0;font-size:11px;margin-left:8px}
.chev.closed{transform:rotate(-90deg)}
.clickhint{font-size:10px;color:#8fa3b0;font-weight:400;font-style:italic;margin-left:6px}
.card-body.collapsed{display:none}
.hint{font-size:11px;color:#8fa3b0;padding:6px 16px;background:#fafbfc;border-bottom:1px solid #eef1f5;font-style:italic}
/* table */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#8fa3b0;padding:8px 16px;text-align:left;border-bottom:1px solid #eef1f5;white-space:nowrap;background:#fafbfc}
td{padding:10px 16px;border-bottom:1px solid #f0f3f6;vertical-align:middle}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:#f7f9fc}
tbody tr.sel td{background:#eef4ff}
/* badges */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bg{background:#d4edda;color:#155724}.ba{background:#fff3cd;color:#856404}
.br{background:#f8d7da;color:#721c24}.bb{background:#cce5ff;color:#004085}
.vtag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.v-sjr{background:#D9E2F3;color:#3A5A8C}.v-jrs{background:#E2EFDA;color:#4C7A3A}
.v-ppp{background:#FCE4D6;color:#B85C2E}.v-tbb{background:#FFF2CC;color:#9C7E1A}
.v-yj{background:#EAD9F3;color:#6B3A8C}
.nat{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.nkr{background:#E2EFDA;color:#4C7A3A}.nhk{background:#D9E2F3;color:#3A5A8C}
.nusa{background:#FCE4D6;color:#B85C2E}.nsg{background:#FFF2CC;color:#9C7E1A}
.nph{background:#f3e6ff;color:#5c2d91}
.nfr{background:#dbeeff;color:#1b5faa}.nit{background:#e3f6e0;color:#2e7d32}
/* fill bar */
.fw{display:flex;align-items:center;gap:8px}
.bar{width:90px;height:7px;background:#eaecef;border-radius:4px;overflow:hidden;flex-shrink:0}
.bi{height:100%;border-radius:4px}
.bh{background:#28a745}.bm{background:#ffc107}.bl{background:#dc3545}
.fp{font-size:11px;color:#8fa3b0;width:32px}
/* nums */
.n{font-variant-numeric:tabular-nums;font-weight:600}
.np{color:#155724}.nn{color:#721c24}.nz{color:#8fa3b0}
/* bottom sheet */
#bd{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90;display:none;opacity:0;transition:opacity .25s}
#bd.open{display:block;opacity:1}
#sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.15);z-index:91;max-height:82vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1,.6,1)}
#sheet.open{transform:translateY(0)}
.sh{width:36px;height:4px;background:#dde3ea;border-radius:2px;margin:10px auto 4px}
.shead{padding:8px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eef1f5;flex-shrink:0}
.shead h3{font-size:15px;font-weight:700}
.sclose{background:none;border:none;font-size:20px;color:#8fa3b0;cursor:pointer;padding:2px 6px}
.sclose:hover{color:#1a2633}
.sbody{overflow-y:auto;flex:1}
/* sheet internals */
.sbox{margin:14px 16px 0;background:#f4f6f9;border-radius:8px;padding:12px 14px}
.sbox .row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #e5e9ef}
.sbox .row:last-child{border-bottom:none;font-weight:700}

// item schema: {flavor, apex?, ku?, type? (kr only)} — apex/ku are each optional
// so one entry can set just one side (e.g. a กู๋-only recount that doesn't
// touch apex, or the original APEX-only recounts that don't touch กู๋)
function applyStockRecount(r){
  r.items.forEach(it=>{
    let arr, item;
    if(r.market==='kr'){
      item = D.kr.find(x=>x.flavor===it.flavor && x.type===it.type);
      if(!item) return;
    } else {
      arr = r.kind==='outer' ? (r.market==='hk'?D.hkOuter:D.sgOuter) : (r.market==='hk'?D.hk:D.sg);
      item = arr.find(x=>x.flavor===it.flavor);
      if(!item){ item={flavor:it.flavor,apex:0,ku:0}; arr.push(item); }
    }
    const scope = r.market==='kr' ? `KR-${it.type}` : (r.market.toUpperCase() + (r.kind==='outer'?'-Outer':''));
    if(it.apex!==undefined){
      const before = item.apex;
      item.apex = it.apex;
      const diff = it.apex - (before||0);
      const deltaStr = diff===0 ? '' : (diff>0?`+${f(diff)}`:`${f(diff)}`);
      logAudit('stock_update', it.flavor, r.ref, deltaStr, before, it.apex, 'นับสต็อกจริงที่ APEX — แทนที่ค่าเดิมด้วยตัวเลขนับจริง (ไม่แตะ กู๋)', scope);
    }
    if(it.ku!==undefined){
      const before = item.ku;
      item.ku = it.ku;
      const diff = it.ku - (before||0);
      const deltaStr = diff===0 ? '' : (diff>0?`+${f(diff)}`:`${f(diff)}`);
      logAudit('stock_update', it.flavor, r.ref, deltaStr, before, it.ku, 'นับสต็อกจริงที่กู๋ — แทนที่ค่าเดิมด้วยตัวเลขนับจริง (ไม่แตะ APEX)', scope);
    }
  });
}

// Applies a loaded state object (from the live backend or the local cache) to

// (PATCHES/RECEIPTS/SUPPLIER_ADDITIONS/MILESTONES/STOCK_RECOUNTS/APEX_DRAWS).
// Returns true if anything changed and needs to be saved back.
function applyLoadedState_(d){
  if(d){
    D.hk = d.hk || JSON.parse(JSON.stringify(DEF_HK));
    D.hkOuter = d.hkOuter || JSON.parse(JSON.stringify(DEF_HK_OUTER));
    D.sg = d.sg || JSON.parse(JSON.stringify(DEF_SG));
    D.sgOuter = d.sgOuter || JSON.parse(JSON.stringify(DEF_SG_OUTER));
    D.kr = d.kr || JSON.parse(JSON.stringify(DEF_KR));
    D.received = d.received || {};
    D.audit = d.audit || [];
    D.patches_applied = d.patches_applied || [];
  } else {
    D.hk = JSON.parse(JSON.stringify(DEF_HK));
    D.hkOuter = JSON.parse(JSON.stringify(DEF_HK_OUTER));
    D.sg = JSON.parse(JSON.stringify(DEF_SG));
    D.sgOuter = JSON.parse(JSON.stringify(DEF_SG_OUTER));
    D.kr = JSON.parse(JSON.stringify(DEF_KR));
    D.received = {}; D.audit = []; D.patches_applied = [];
  }
  // ensure Black Spearmint exists in HK stock (migration)
  if(!D.hk.find(x=>x.flavor==='Black Spearmint')){
    D.hk.push({flavor:'Black Spearmint',apex:0,ku:0});
  }
  if(!D.hkOuter) D.hkOuter = JSON.parse(JSON.stringify(DEF_HK_OUTER));
  // ensure every HK flavor exists in Outer box too (migration)
  D.hk.forEach(x=>{
    if(!D.hkOuter.find(o=>o.flavor===x.flavor)) D.hkOuter.push({flavor:x.flavor,apex:null,ku:null});
  });
  // ensure Grapefruit/Party exist in SG stock (migration, matches live sheet flavors)
  ['Grapefruit','Party'].forEach(fl=>{
    if(!D.sg.find(x=>x.flavor===fl)) D.sg.push({flavor:fl,apex:null,ku:0});
    if(!D.sgOuter.find(x=>x.flavor===fl)) D.sgOuter.push({flavor:fl,apex:null,ku:0});
  });
  // apply any pending patches / receipts (one-time events, run once each via id)
  let patched = false;
  // merge "Spearmint" into "Black Spearmint" for HK — Ji confirmed (16 Jul 2026)
  // these were the same product tracked under two names by mistake, and that
  // only Black Spearmint's own numbers (apex 379, ku 1644) are the real ones.
  // Drop the old separate "Spearmint" line entirely (not merged/added into
  // Black Spearmint's totals) for anyone whose already-synced state still has it.
  if(D.hk.find(x=>x.flavor==='Spearmint')){
    D.hk = D.hk.filter(x=>x.flavor!=='Spearmint');
    patched = true;
  }
  if(D.hkOuter.find(x=>x.flavor==='Spearmint')){
    D.hkOuter = D.hkOuter.filter(x=>x.flavor!=='Spearmint');
    patched = true;
  }
  PATCHES.forEach(p=>{
    if(!D.patches_applied.includes(p.id)){ applyPatch(p); D.patches_applied.push(p.id); patched = true; }
  });
  RECEIPTS.forEach(rc=>{
    if(!D.patches_applied.includes(rc.id)){ applyReceipt(rc); D.patches_applied.push(rc.id); patched = true; }
  });
  SUPPLIER_ADDITIONS.forEach(sa=>{
    if(!D.patches_applied.includes(sa.id)){ applySupplierAddition(sa); D.patches_applied.push(sa.id); patched = true; }
  });
  MILESTONES.forEach(m=>{
    if(!D.patches_applied.includes(m.id)){ applyMilestone(m); D.patches_applied.push(m.id); patched = true; }
  });
  STOCK_RECOUNTS.forEach(r=>{
    if(!D.patches_applied.includes(r.id)){ applyStockRecount(r); D.patches_applied.push(r.id); patched = true; }
  });
  APEX_DRAWS.forEach(dr=>{
    if(!D.patches_applied.includes(dr.id)){ applyApexDraw(dr); D.patches_applied.push(dr.id); patched = true; }
  });
  return patched;

      const remote = await gasGet();

      gasState.lastSync = Date.now();
      const isEmpty = !remote.state || Object.keys(remote.state).length===0;
      patched = applyLoadedState_(remote.state) || isEmpty;
      usedRemote = true;

      console.error('remote load failed, falling back to local cache', e);
      gasState.online = false;

      const r = await storage.get('inv_v1');
      const hadLocal = !!(r && r.value);
      patched = applyLoadedState_(hadLocal ? JSON.parse(r.value) : null) || !hadLocal;
    }catch(e){
      applyLoadedState_(null);
      patched = true;
    }
  }

// Two loading strategies, tried in order — some sandboxed preview/artifact
// viewers block <script> tags to external domains (CSP script-src) but allow
// fetch(), others are the reverse; trying both maximizes the chance live sync
// actually works wherever this file happens to be opened.
function gvizLoad(sheetName, opts={}){
  return gvizLoadFetch(sheetName, opts).catch(e1=>
    gvizLoadJsonp(sheetName, opts).catch(e2=>{
      throw new Error(`fetch: ${e1.message} · jsonp: ${e2.message}`);
    })
  );
}
async function gvizLoadFetch(sheetName, opts={}){
  const params=new URLSearchParams({tqx:'out:json', sheet:sheetName});
  if(opts.range) params.set('range', opts.range);
  if(opts.headers!=null) params.set('headers', String(opts.headers));
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?${params.toString()}`;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(), 12000);
  let res;
  try{
    res=await fetch(url, {credentials:'omit', signal:ctrl.signal});
  }finally{ clearTimeout(timer); }
  if(!res.ok) throw new Error('http '+res.status);
  const text=await res.text();
  const start=text.indexOf('{'), end=text.lastIndexOf('}');
  if(start<0||end<0) throw new Error('unexpected response format');
  // response body isn't strict JSON — Date(y,m,d) cell values need quoting first
  const body=text.slice(start,end+1).replace(/Date\(([^)]+)\)/g, (m,args)=>`"Date(${args})"`);
  return JSON.parse(body);
}
function gvizLoadJsonp(sheetName, opts={}){
  return new Promise((resolve,reject)=>{
    const cbName='gviz_cb_'+Math.random().toString(36).slice(2);
    const params=new URLSearchParams({tqx:'out:json;responseHandler:'+cbName, sheet:sheetName});
    if(opts.range) params.set('range', opts.range);
    if(opts.headers!=null) params.set('headers', String(opts.headers));
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?${params.toString()}`;
    const script=document.createElement('script');
    let done=false;
    const timer=setTimeout(()=>{ if(!done){ done=true; cleanup(); reject(new Error('timeout')); } },12000);
    function cleanup(){ clearTimeout(timer); delete window[cbName]; script.remove(); }
    window[cbName]=(resp)=>{ if(done) return; done=true; cleanup(); resolve(resp); };
    script.onerror=()=>{ if(done) return; done=true; cleanup(); reject(new Error('script load failed')); };
    script.src=url;
    document.body.appendChild(script);
  });
}
function gvizParseDateMs(v){
  if(typeof v!=='string') return null;
  const m=/^Date\((\d+),(\d+),(\d+)/.exec(v);
  if(!m) return null;
  return Date.UTC(+m[1], +m[2], +m[3]);
}
function gvizDateToSerial(v){
  const ms=gvizParseDateMs(v);
  if(ms==null) return null;
  return Math.round((ms - Date.UTC(1899,11,30))/86400000);
}

// ─── SUPPLIER PO LIVE SYNC ─────────────────────────────────────────────────
// (16 Jul 2026, per Ji's request: "then pls make it sync") Reads the
// "Supplier" tab of the same Google Sheet, which stacks four vendor blocks
// (SJR / JRS / PPP / Thai BB) in one tab, each starting with a single-cell
// vendor-name marker row, then a header row, then data rows, separated by
// blank rows. Scope, confirmed with Ji this session (go with option 3, but
// with an explicit carve-out she asked for):
//   - Dates (sent/expected/actual), destination, and remark DO live-sync from
//     the sheet for POs that already exist in DEF_POS/D.pos — these are
//     status fields Ji wants to track live, and there's no known conflict.
//   - Item/quantity breakdowns for POs that ALREADY exist are NEVER touched
//     by this sync. Those numbers are confirmed with Ji directly in chat
//     (e.g. SJR PO 04's Donki=3,000 — the sheet's own Remark text still says
//     "2,500", stale, proven wrong this same session) and must not silently
//     regress on every sync just because the sheet wasn't updated to match.
//   - Brand-new POs not yet in DEF_POS auto-appear with everything the sheet
//     has except items (per Ji: "ขึ้นโชว์อัตโนมัติ (ยังไม่มี items)") — item
//     breakdowns for those still need to go through chat before being added.
function normalizeSupplierPO(raw, vendor){
  let s = String(raw||'').trim();
  if(!s) return '';
  if(vendor==='SJR'){
    // sheet uses short form "PO 01"/"PO 03"/"PO 04" → formal "01INT-SJR26/0NN"
    const m = /^PO\s*(\d+)$/i.exec(s);
    if(m) return `01INT-SJR26/${m[1].padStart(3,'0')}`;
  }
  // JRS/PPP/Thai BB: strip an optional leading "PO " prefix and any internal
  // whitespace (Thai BB's sheet has "03 INT-TBB26/010" with a stray space)
  return s.replace(/^PO\s+/i,'').replace(/\s+/g,'');
}
function normalizeSupplierProduct(raw){
  const s = String(raw||'').trim();
  if(!s) return '';
  return /^cartons?$/i.test(s) ? 'Carton' : s;
}
// column layout per vendor block, 0-based index into the raw A:H row
const SUPPLIER_BLOCK_LAYOUT = {
  'SJR':     {nat:0, product:null, po:2, sent:3,    exp:4, act:5, dest:6, remark:7},
  'JRS':     {nat:0, product:1,    po:2, sent:null, exp:3, act:4, dest:5, remark:6},
  'PPP':     {nat:0, product:1,    po:2, sent:null, exp:3, act:4, dest:5, remark:6},
  'Thai BB': {nat:0, product:1,    po:2, sent:null, exp:3, act:4, dest:5, remark:6},
};
async function syncSupplierPOs(){
  LIVE.supplier.status='loading'; if(TAB==='po') renderMain();
  try{
    const resp = await gvizLoad('Supplier', {range:'A1:H60', headers:0});
    if(!resp || resp.status==='error' || !resp.table) throw new Error('bad response');
    const rows = resp.table.rows.map(r=>(r.c||[]));
    const cellStr = c => (c && c.v!=null) ? String(c.v).trim() : '';
    const isBlankRow = row => row.every(c=>!cellStr(c));
    const VENDOR_NAMES = ['SJR','JRS','PPP','Thai BB'];
    // sheet block-marker name -> vendor code actually stored in DEF_POS/D.pos
    // (Thai BB's marker cell literally says "Thai BB" but every existing
    // DEF_POS entry for it uses the abbreviated code 'TBB' — without this
    // mapping, matching by vendor code fails on every sync and a duplicate
    // "new" PO gets created every single time instead of updating s9)
    const VENDOR_CODE = {'SJR':'SJR','JRS':'JRS','PPP':'PPP','Thai BB':'TBB'};
    // Classify every row purely by its OWN content — never by its position or
    // distance from another row. Earlier versions skipped a fixed "marker+1"
    // or "marker+2" offset to land on data rows, which broke against the real
    // gviz response in more than one way (blank-row gaps not always present,
    // and even when a next-vendor marker WAS used as a stop condition, a
    // header row could still slip through and get read as data — confirmed
    // 16 Jul 2026 from a live screenshot showing a bogus po="NO." row and,
    // separately, a bogus row inside the Thai BB group with product="Product"
    // / nat="Nationality" literally being the header text itself). A row's
    // first cell is always self-describing: "SJR"/"JRS"/"PPP"/"Thai BB" alone
    // (rest blank) = marker, "Nationality" = header, every other cell in col
    // A blank = blank row, anything else while a vendor is active = its data.
    const norm = str => String(str||'').replace(/\s+/g,' ').trim().toUpperCase();
    const blocksByVendor = {};
    let currentVendor = null;
    for(let i=0;i<rows.length;i++){
      const row = rows[i]||[];
      if(isBlankRow(row)) continue; // blank rows never carry meaning either way
      const a = norm(cellStr(row[0]));
      // Match on column A alone — do NOT also require the rest of the row to
      // be blank. Requiring that turned out to be the second failure mode
      // (16 Jul 2026, round 2): a live screenshot showed a Thai BB PO
      // duplicated under the wrong (previous) vendor's card, which only
      // happens if the "Thai BB" marker row itself failed to switch
      // currentVendor — most likely because gviz returned something in
      // another cell of that row that broke the old "rest must be blank"
      // check. A vendor code ("SJR"/"JRS"/"PPP"/"Thai BB") is never a real
      // Nationality value, so matching on column A alone carries no
      // real risk of misfiring on an actual data row.
      const marker = VENDOR_NAMES.find(v=>norm(v)===a);
      if(marker){ currentVendor = marker; continue; } // switch active vendor, skip the marker row itself
      if(a==='NATIONALITY') continue; // header row (every block's header starts with this) — always skip, regardless of position
      if(!currentVendor) continue; // stray content before the first marker — ignore
      (blocksByVendor[currentVendor] = blocksByVendor[currentVendor] || []).push(row);
    }
    const blocks = Object.keys(blocksByVendor).map(vendor=>({vendor, rows:blocksByVendor[vendor]}));
    if(!blocks.length) throw new Error('no vendor blocks found — sheet layout changed, keeping last known data');
    // gviz date cells parse to a real serial number; free-text cells (e.g. Thai
    // BB's "06.07.2026\n11.07.2026" two-dates-in-one-cell) return null here on
    // purpose — the caller then just leaves the existing date alone rather
    // than blanking it out or crashing on the irregular text.
    const pickDate = c => {
      if(!c || c.v==null || c.v==='') return {ms:null, str:null};
      const serial = gvizDateToSerial(c.v);
      if(serial==null) return {ms:null, str:null};
      return {ms:xlMs(serial), str:xl(serial)};
    };
    const usedIds = new Set(D.pos.map(p=>p.id));
    let dupeIdx = 1;
    blocks.forEach(({vendor, rows})=>{
      const layout = SUPPLIER_BLOCK_LAYOUT[vendor];
      const vendorCode = VENDOR_CODE[vendor] || vendor;
      rows.forEach(row=>{
        const poRaw = cellStr(row[layout.po]);
        if(!poRaw) return;
        const po = normalizeSupplierPO(poRaw, vendor);
        if(!po) return;
        const nat = cellStr(row[layout.nat]);
        const product = layout.product!=null ? normalizeSupplierProduct(cellStr(row[layout.product])) : 'Inner box';
        const dest = cellStr(row[layout.dest]);
        const remark = cellStr(row[layout.remark]);
        const sent = layout.sent!=null ? pickDate(row[layout.sent]) : {ms:null,str:null};
        const exp = pickDate(row[layout.exp]);
        const act = pickDate(row[layout.act]);
        // Match by PO number alone, not po+vendor. PO codes already embed
        // the vendor abbreviation in the string itself (e.g. "01INT-SJR26/004",
        // "03INT-TBB26/010"), so they're unique on their own — and matching
        // this way means even if block-parsing ever mis-tags a row's vendor
        // for some future gviz quirk we haven't seen yet, it updates the
        // existing PO instead of silently creating a second copy of it under
        // the wrong vendor's card (confirmed happened 16 Jul 2026, round 3 —
        // Thai BB's PO showed up duplicated under a different vendor card).
        const entry = D.pos.find(p=>p.po===po);
        if(entry){
          // existing PO — sync status fields only, items/product/nat frozen
          if(exp.ms!=null){ entry.expMs = exp.ms; entry.exp = exp.str; }
          if(act.ms!=null){ entry.actMs = act.ms; entry.act = act.str; }
          if(layout.sent!=null && sent.ms!=null){ entry.sentMs = sent.ms; entry.sent = sent.str; }
          if(dest) entry.dest = dest;
          if(remark){
            // keep the "needs items via chat" flag showing on every subsequent
            // sync (not just the first one) for as long as items stays empty —
            // otherwise it silently disappears the next time this runs (every
            // ~3 min) and Ji would have no visible cue to tell me the breakdown
            entry.remark = (entry.items&&entry.items.length===0)
              ? remark+' · [ดึงจากชีตอัตโนมัติ — ยังไม่มีรายการสินค้า รอ confirm ผ่านแชท]'
              : remark;
          }
        } else {
          // brand-new PO the dashboard doesn't know about yet — auto-add,
          // no items (needs chat confirmation before quantities go in)
          let id = 'sync_' + po.toLowerCase().replace(/[^a-z0-9]/g,'');

// Layout: Date | Code | Deducted | Added | Before | Remaining | Remark
// (Remark moved to the far right). "Code" is auto-extracted via regex
// matching the official Supplier PO code format (01INT-{vendor}26/{digits};
// TBB's 03INT- exception matches too) — blank when no such code appears
// (e.g. APEX PO refs like "APEX PO 043" don't follow this format). The
// Deducted cell now also shows a small "จาก APEX"/"จาก กู๋"/"จาก APEX+กู๋"
// label under the number when `performApexDraw()`'s breakdown note (see
// round 3) tells us which bucket(s) it came from — parsed from a.note via
// `deductSourceLabel()`. Entries without that breakdown (old PATCHES,
// manual edits, KR single-bucket) just show no label, same as before.
const PO_CODE_RE = /\d{2}INT-[A-Za-z]+26\/\d+[A-Za-z0-9]*/;
function extractPoCode(a){
  const hay = `${a.detail||''} ${a.title||''} ${a.note||''}`;
  const m = PO_CODE_RE.exec(hay);
  return m ? m[0] : '';
}
function deductSourceLabel(note){
  if(!note) return '';
  if(/หักจาก APEX ทั้งหมด/.test(note)) return 'จาก APEX';
  if(/หักจาก กู๋ทั้งหมด/.test(note)) return 'จาก กู๋';
  if(/หักจาก APEX[^+]*\+\s*กู๋/.test(note)) return 'จาก APEX+กู๋';
  return '';
}
function renderHistoryTable(logs, limit){
  limit = limit || 15;
  if(!logs.length) return '<div style="color:#8fa3b0;font-size:12px;padding:6px 0">No history yet</div>';
  return `<div class="tw" style="margin:0 -16px;width:calc(100% + 32px)"><table style="font-size:12px"><thead><tr>

  </tr></thead><tbody>${logs.slice(0,limit).map(a=>{
    const qtyStr=(a.qty!=null?String(a.qty):'').trim();
    const isNeg = qtyStr.startsWith('-');
    const isPos = qtyStr.startsWith('+');
    const num = qtyStr.replace(/^[+-]/,'');
    const code = extractPoCode(a);
    const ref = a.detail||a.title;
    const remark = a.note ? `${ref} · ${a.note}` : ref;
    const srcLabel = isNeg ? deductSourceLabel(a.note) : '';
    const srcLabelHtml = srcLabel ? `<div style="font-size:9.5px;font-weight:400;color:#8fa3b0;margin-top:1px">${srcLabel}</div>` : '';
    return `<tr style="cursor:default">
      <td style="white-space:nowrap;font-size:11px;vertical-align:top">${a.ts}</td>
      <td style="white-space:nowrap;font-size:11px;vertical-align:top">${code||'—'}</td>
      <td class="n nn" style="text-align:right;white-space:nowrap;vertical-align:top">${isNeg?num:''}${srcLabelHtml}</td>
      <td class="n np" style="text-align:right;white-space:nowrap;vertical-align:top">${isPos?num:''}</td>
      <td class="n nz" style="text-align:right;white-space:nowrap;vertical-align:top">${a.before!=null?f(a.before):'—'}</td>
      <td class="n" style="text-align:right;white-space:nowrap;font-weight:700;vertical-align:top">${a.after!=null?f(a.after):'—'}</td>
      <td style="font-weight:600;vertical-align:top;min-width:160px">${remark}</td>
    </tr>`;
  }).join('')}</tbody></table></div>`;
}

// performApexDraw = แกนหลักของ "สั่ง APEX แล้วตัดสต็อก" — ใช้ร่วมกันทั้งปุ่มบนหน้าเว็บ
// (drawToApex, อ่านค่าจากฟอร์ม) และรายการ APEX_DRAWS (ตอน Ji บอกทางแชท Claude เพิ่ม
// entry แล้วโค้ดใช้ฟังก์ชันนี้ตัดสต็อกให้อัตโนมัติตอนโหลดหน้า — คำนวณเหมือนกันทุกจุด)
function performApexDraw(market, flavor, unit, qty, poRef){
  qty = parseInt(qty)||0;
  if(!flavor || qty<=0 || !poRef) return {ok:false};
  const cartonQty = unit==='carton' ? qty : 0;
  const innerQty = unit==='carton' ? qty*IPC : qty;
  const cartonLbl = market==='kr' ? 'ลัง' : 'ลังนอก';
  if(market==='kr'){
    if(cartonQty>0){
      const row=D.kr.find(x=>x.flavor===flavor && x.type==='Carton');
      if(row){ const before=row.apex||0; row.apex=before-cartonQty;
        logAudit('deduct',flavor,poRef,`-${f(cartonQty)}`,before,row.apex,`เบิกให้ APEX ${f(cartonQty)} ${cartonLbl}`,'KR-Carton'); }
    }
    if(innerQty>0){
      const row=D.kr.find(x=>x.flavor===flavor && x.type==='Inner box');
      if(row){ const before=row.apex||0; row.apex=before-innerQty;
        logAudit('deduct',flavor,poRef,`-${f(innerQty)}`,before,row.apex, unit==='carton'?`หักตาม ${f(cartonQty)} ${cartonLbl} × ${IPC} = ${f(innerQty)} กล่องใน`:`เบิกให้ APEX ${f(innerQty)} กล่องใน`,'KR-Inner box'); }
    }
  } else {
    const innerArr = market==='hk'?D.hk:D.sg;
    const outerArr = market==='hk'?D.hkOuter:D.sgOuter;
    const mktKey = market.toUpperCase();
    // spend() — หักจาก "ที่ APEX" ก่อนเสมอ ถ้าไม่พอค่อยไหลไปหักต่อที่ "กู๋" (ติดลบได้)
    // แล้วคืนข้อความสรุปว่าหักจากที่ไหนไปเท่าไหร่ ก่อน→หลัง ให้เห็นชัดเจน ไม่ใช่แค่
    // ยอดรวม (Ji ขอ 10 ก.ค. 2026: "หักจาก APEX หรือ กู๋ ตอนนี้รวมเหลือเท่าไหร่")
    const spend=(arr,delta)=>{
      const row=arr.find(x=>x.flavor===flavor);
      if(!row) return null;
      const beforeApex=row.apex||0, beforeKu=row.ku||0, beforeTotal=beforeApex+beforeKu;
      let remain=delta, newApex=beforeApex, newKu=beforeKu;
      if(newApex>=remain){ newApex-=remain; remain=0; } else { remain-=newApex; newApex=0; }
      if(remain>0) newKu-=remain;
      row.apex=newApex; row.ku=newKu;
      const apexUsed=beforeApex-newApex, kuUsed=beforeKu-newKu;
      let breakdown;
      if(apexUsed>0 && kuUsed>0) breakdown=`หักจาก APEX ${f(apexUsed)} (${f(beforeApex)}→${f(newApex)}) + กู๋ ${f(kuUsed)} (${f(beforeKu)}→${f(newKu)}) เพราะ APEX ไม่พอ`;
      else if(apexUsed>0) breakdown=`หักจาก APEX ทั้งหมด (${f(beforeApex)}→${f(newApex)}) · กู๋ไม่กระทบ (${f(newKu)})`;
      else breakdown=`หักจาก กู๋ทั้งหมด เพราะ APEX ไม่พอ/หมด (${f(beforeApex)}→${f(newApex)}) · กู๋ (${f(beforeKu)}→${f(newKu)})`;
      return {beforeTotal, afterTotal:newApex+newKu, breakdown};
    };
    if(cartonQty>0){
      const r=spend(outerArr,cartonQty);
      if(r) logAudit('deduct',flavor,poRef,`-${f(cartonQty)}`,r.beforeTotal,r.afterTotal,`เบิกให้ APEX ${f(cartonQty)} ${cartonLbl} · ${r.breakdown}`,mktKey+'-Outer');
    }
    if(innerQty>0){
      const r=spend(innerArr,innerQty);
      const calcNote = unit==='carton'?`หักตาม ${f(cartonQty)} ${cartonLbl} × ${IPC} = ${f(innerQty)} กล่องใน`:`เบิกให้ APEX ${f(innerQty)} กล่องใน`;
      if(r) logAudit('deduct',flavor,poRef,`-${f(innerQty)}`,r.beforeTotal,r.afterTotal, `${calcNote} · ${r.breakdown}`,mktKey);
    }
  }
  return {ok:true, cartonQty, innerQty, cartonLbl};
}

}

// เป็นตัวเลข "กำลังจะมา" ตรงนี้แทน ให้เห็นว่าถ้าของมาจริงจะรวมเป็นเท่าไหร่ โดยไม่ไป
// แตะยอด apex ปัจจุบันเลย (แค่แสดงผลบวกล่วงหน้าเฉยๆ)
function incomingByFlavor(marketKey){
  const map = {};
  D.pos.forEach(p=>{
    if(p.nat!==marketKey) return;
    if(String(p.dest||'').toUpperCase()!=='APEX') return;
    if(p.act) return; // already received — already counted in current apex, not "incoming" anymore
    if(p.product && p.product!=='Inner box') return;
    (p.items||[]).forEach(it=>{ map[it.f] = (map[it.f]||0) + (it.q||0); });
  });
  return map;
}

  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayKey=dayKey(Date.now());
  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div style="min-height:64px"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const cellDate=new Date(y,m,d);
    const ms=cellDate.getTime();
    const key=dayKey(ms);
    const dayEvs=evs.filter(e=>dayKey(e.ms)===key);
    const isToday=key===todayKey;
    const isSel=CAL_SEL!==null && dayKey(CAL_SEL)===key;
    const dots=dayEvs.slice(0,4).map(e=>`<span style="width:6px;height:6px;border-radius:50%;background:${CAL_CAT_LABEL[e.cat].dot};display:inline-block;margin:1px"></span>`).join('');
    const more=dayEvs.length>4?`<div style="font-size:9px;color:#8fa3b0">+${dayEvs.length-4}</div>`:'';
    cells+=`<div onclick="calSelect(${ms})" title="คลิกเพื่อดูรายการวันนี้" style="min-height:64px;border:1px solid ${isSel?'#1a2633':'#eef1f5'};border-radius:6px;padding:5px;cursor:pointer;background:${isToday?'#eef4ff':'#fff'}">
      <div style="font-size:11px;font-weight:${isToday?700:500};color:${isToday?'#1a2633':'#5b6b76'}">${d}</div>
      <div style="display:flex;flex-wrap:wrap;gap:1px;margin-top:3px">${dots}</div>${more}
    </div>`;
  }
  return `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;font-size:10px;color:#8fa3b0;text-transform:uppercase;text-align:center">
    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>`;
}

      <div class="save-notice">* ตัวเลข "ต้องสั่งเพิ่ม" = กล่องในที่ต้องการ − กล่องในที่มีอยู่แล้ว (ถ้าติดลบคือมีพอแล้ว)</div>
    </div></div>`;

function runCalc(){
  const mkts=[{id:'hk',label:'HK — Nude',fl:FLAVORS.HK,data:D.hk},{id:'sg',label:'SG — Nuke',fl:FLAVORS.SG,data:D.sg},{id:'kr',label:'KR — Duo Burster',fl:FLAVORS.KR,data:null}];
  let rows=[]; let totalNeedInner=0, totalNeedCarton=0;
  mkts.forEach(m=>{
    m.fl.forEach(fl=>{
      const el=document.getElementById(`ci_${m.id}_${fl.replace(/ /g,'_')}`);
      const pcs=parseInt(el?.value)||0;
      if(pcs<=0) return;
      const needInner=Math.ceil(pcs/IPU);
      const haveInner=m.data?Math.max(0,stockOf(m.data,fl)):0;
      const orderInner=Math.max(0,needInner-haveInner);
      const orderCarton=orderInner>0?Math.ceil(orderInner/IPC):0;
      totalNeedInner+=orderInner; totalNeedCarton+=orderCarton;
      rows.push({market:m.label,flavor:fl,pcs,needInner,haveInner,orderInner,orderCarton});
    });
  });
  if(!rows.length){ alert('กรอกจำนวนชิ้นก่อนนะครับ'); return; }
  const tbl=document.getElementById('rt');
  tbl.innerHTML=`<tr><th>ตลาด</th><th>รสชาติ</th><th>ลูกค้าสั่ง</th><th>กล่องในที่ต้องการ</th><th>มีอยู่แล้ว</th><th>ต้องสั่งเพิ่ม</th><th>กล่องลัง</th></tr>
    ${rows.map(r=>`<tr>
      <td>${r.market}</td><td>${r.flavor}</td>
      <td class="n">${f(r.pcs)}</td>
      <td class="n">${f(r.needInner)}</td>
      <td class="n np">${f(r.haveInner)}</td>
      <td class="n ${r.orderInner>0?'need':'ok'}">${r.orderInner>0?'+'+f(r.orderInner):'✓ พอแล้ว'}</td>
      <td class="n ${r.orderCarton>0?'need':'ok'}">${r.orderCarton>0?f(r.orderCarton)+' ลัง':'—'}</td>
    </tr>`).join('')}
    <tr><td colspan="5" style="font-weight:700">รวมทั้งหมด</td><td class="n need">${totalNeedInner>0?'+'+f(totalNeedInner):'✓ พอทั้งหมด'}</td><td class="n">${totalNeedCarton>0?f(totalNeedCarton)+' ลัง':'—'}</td></tr>`;
  document.getElementById('rw').style.display='block';
  // purely a local scratch calculation now — no audit log entry, no save,
  // so using this tool never triggers the PIN prompt (site is view-only)
}

function renderIncBar(){
  const pending=D.pos.filter(p=>(!p.act)&&(!D.received[p.id]));
  const bar=document.getElementById('inc-bar');
  if(!pending.length){ bar.style.display='none'; return; }
  bar.style.display='block';
  document.getElementById('inc-count').textContent=pending.length;
  const nearest=pending.filter(p=>p.expMs).sort((a,b)=>a.expMs-b.expMs)[0];
  const days=nearest?daysFrom(nearest.expMs):null;
  document.getElementById('inc-text').textContent= days!==null
    ?`กำลังจะมาส่ง · ใกล้สุด: ${nearest.vendor} ${nearest.product} ${days<=0?'วันนี้/เลยกำหนด':'อีก '+days+' วัน'}`
    :`กำลังจะมาส่ง ${pending.length} รายการ`;
}
function toggleInc(){
  incOpen=!incOpen;
  document.getElementById('inc-drop').classList.toggle('open',incOpen);
  document.getElementById('inc-arrow').classList.toggle('open',incOpen);
  if(incOpen) renderIncList();
}
function renderIncList(){
  const pending=D.pos.filter(p=>(!p.act)&&(!D.received[p.id]));
  const sort=document.getElementById('inc-sort')?.value||'asc';
  const sorted=[...pending].sort((a,b)=>{
    const da=a.expMs||(sort==='asc'?Infinity:-Infinity);
    const db=b.expMs||(sort==='asc'?Infinity:-Infinity);
    return sort==='asc'?da-db:db-da;
  });
  document.getElementById('inc-count-lbl').textContent=`${pending.length} รายการ`;
  document.getElementById('inc-list').innerHTML=sorted.map(p=>{
    const days=daysFrom(p.expMs);
    const dstr=days===null?'—':days<0?`${Math.abs(days)} วันที่แล้ว`:days===0?'วันนี้':`อีก ${days} วัน`;
    const dcls=days===null?'':days<=3?'ds':days<=7?'dm':'df';
    const isum=p.items&&p.items.filter(i=>i.f).length?p.items.filter(i=>i.f).map(i=>i.f+(i.q?' '+f(i.q):'')).join(' · '):'';
    return `<div class="inc-item">
      <div class="inc-info">
        <div class="inc-name"><span class="vtag v-${p.vendor.toLowerCase()}">${p.vendor}</span>&nbsp; ${p.product} · ${p.nat}</div>
        <div class="inc-meta">${p.po}${p.exp?' · '+p.exp:''}${isum?' · '+isum:''}</div>
      </div>
      <div class="inc-days"><div class="dn ${dcls}">${dstr}</div></div>
    </div>`;
  }).join('')||'<div style="padding:14px 22px;color:#8fa3b0;font-size:13px">ไม่มีรายการที่รออยู่</div>';
}
function qkReceive(id, vendor, po){
  const rmk=(document.getElementById('irmk_'+id)?.value||'').trim();
  D.received[id]={date:tsNow(), remark:rmk};
  logAudit('mark_recv',`${vendor} · ${po}`,`รับสินค้าแล้ว${rmk?' · Remark: '+rmk:''}`,'+1 PO');
  saveAll(); renderIncList(); renderIncBar(); renderMain();
}
// ─── UTILS ────────────────────────────────────────────────────────────────
function toggleCard(head){
  head.nextElementSibling.classList.toggle('collapsed');
  const chev=head.querySelector('.chev');
  if(chev) chev.classList.toggle('closed');
}
function vname(v){ return {SJR:'แสงเจริญ (คุณลูกหยี)',JRS:'จรัสแสง (คุณเล็ก)',PPP:'PaperPack (คุณหยง/คุณลูกหมี)',TBB:'Thai BB',YJ:'หจก.วายเจ ครีเอทีฟ พรินติ้ง'}[v]||v; }
function tick(){ document.getElementById('clock').textContent=new Date().toLocaleString('en-GB'); }
tick(); setInterval(tick,1000);
// boot
loadAll().then(()=>{
  syncAllLive();
  setInterval(syncAllLive, 180000); // re-sync every 3 minutes
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState==='visible'){
      const last=Math.max(LIVE.apex.ts||0, LIVE.sg.ts||0);
      if(Date.now()-last > 60000) syncAllLive();
    }
  });
  if(LIVE_BACKEND_ENABLED){
    setInterval(pollGasState, 25000); // catch edits made by other people every ~25s
    document.addEventListener('visibilitychange', ()=>{
      if(document.visibilityState==='visible' && Date.now()-(gasState.lastSync||0) > 20000) pollGasState();
    });
  }
});
</script>
